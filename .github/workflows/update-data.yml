name: Update Twitch data

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes (best-effort; GitHub may delay)
  workflow_dispatch: {} # run manually from the Actions tab
  push:
    branches: [main]
    paths-ignore:
      - "api/**"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch Twitch data
        run: node scripts/fetch-data.js
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
      - name: Ping Render to keep service warm
        run: curl -s -o /dev/null "https://twitch-badge-dashboard.onrender.com" || true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api
          git diff --cached --quiet || git commit -m "Update Twitch data"
          git push
